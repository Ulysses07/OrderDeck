services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: orderdeck-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQL_PASSWORD}
      MSSQL_PID: Express
    volumes:
      - ./sql-data:/var/opt/mssql
    networks:
      - web
    expose:
      - "1433"
    # SQL Express has a hard 1410 MB process memory cap — keep a comfortable margin
    # so a runaway query can't squeeze the host.
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -C -No || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  license-server:
    build:
      context: ./app
      dockerfile: OrderDeck.LicenseServer/Dockerfile
    container_name: orderdeck-license
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__LicenseDb: "Server=sqlserver,1433;Database=OrderDeckLicense;User=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True;Encrypt=True;"
      Jwt__SecretKey: "${JWT_SECRET}"
      Jwt__Issuer: "orderdeck-license-server"
      App__PublicBaseUrl: "https://license.orderdeckapp.com"
      Smtp__Host: "${SMTP_HOST:-smtp.example.com}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__UseSsl: "${SMTP_USESSL:-true}"
      Smtp__Username: "${SMTP_USERNAME:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      Smtp__FromAddress: "${SMTP_FROM:-noreply@orderdeckapp.com}"
      Smtp__FromName: "OrderDeck"
      Admin__InitialUsername: "${ADMIN_USERNAME:-admin}"
      Admin__InitialPasswordHash: "${ADMIN_PASSWORD_HASH}"
      Backup__MasterKeyHex: "${BACKUP_MASTER_KEY}"
      Backup__StorageRoot: "/app/Backups"
      Backup__MaxBlobSizeMb: "200"
      Backup__S3__Enabled: "${BACKUP_S3_ENABLED:-false}"
      Backup__S3__ServiceUrl: "${BACKUP_S3_SERVICE_URL:-}"
      Backup__S3__AccessKey: "${BACKUP_S3_ACCESS_KEY:-}"
      Backup__S3__SecretKey: "${BACKUP_S3_SECRET_KEY:-}"
      Backup__S3__Bucket: "${BACKUP_S3_BUCKET:-}"
      Backup__S3__Prefix: "${BACKUP_S3_PREFIX:-orderdeck-backups/}"
      Cors__AllowedOrigins: "${CORS_ALLOWED_ORIGINS:-}"
    volumes:
      - ./keys:/root/.aspnet/DataProtection-Keys
      - ./backups:/app/Backups
    networks:
      - web
    expose:
      - "8080"
    # Cap memory/CPU so a backup-upload retry loop or a Hangfire worker storm
    # can't OOM the VPS and take SQL Server down with it.
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 2.0

  caddy:
    image: caddy:2-alpine
    container_name: orderdeck-caddy
    restart: unless-stopped
    depends_on:
      - license-server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    mem_limit: 256m
    memswap_limit: 256m
    cpus: 1.0

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
