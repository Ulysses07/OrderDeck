<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>OrderDeck Çekiliş</title>
  <link rel="stylesheet" href="/giveaway.css">
</head>
<body>
  <div id="giveaway-root" class="hidden">
    <div id="header">
      <span id="emoji">🎁</span>
      <span id="keyword"></span>
      <span id="counter">0 katılımcı</span>
      <span id="countdown"></span>
    </div>

    <div id="reveal" class="hidden">
      <div id="reveal-title">KAZANANLAR</div>
      <ul id="winners-list"></ul>
    </div>

    <!--
      Spinning wheel layout:
      - <canvas> draws the segmented wheel (one slice per participant).
      - <div id="wheel-arrow"> is the fixed pointer at the top.
      - <div id="wheel-name"> shows the currently-highlighted participant
        below the wheel during spin and the final winner once it lands.
    -->
    <div id="wheel" class="hidden">
      <div id="wheel-arrow"></div>
      <canvas id="wheel-canvas" width="520" height="520"></canvas>
      <div id="wheel-name"></div>
    </div>
  </div>

  <script src="/giveaway.js"></script>
</body>
</html>
