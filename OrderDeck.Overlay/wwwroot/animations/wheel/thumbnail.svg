<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <!-- Background -->
  <rect width="200" height="150" fill="#1a1a1a" rx="8"/>

  <!-- Wheel sectors (8 colored wedges around centre at 100,75 with r=52) -->
  <g transform="translate(100,75)">
    <!-- 0°-45° -->
    <path d="M 0 0 L 52 0 A 52 52 0 0 1 36.77 36.77 Z" fill="#ef4444"/>
    <!-- 45°-90° -->
    <path d="M 0 0 L 36.77 36.77 A 52 52 0 0 1 0 52 Z" fill="#f97316"/>
    <!-- 90°-135° -->
    <path d="M 0 0 L 0 52 A 52 52 0 0 1 -36.77 36.77 Z" fill="#eab308"/>
    <!-- 135°-180° -->
    <path d="M 0 0 L -36.77 36.77 A 52 52 0 0 1 -52 0 Z" fill="#22c55e"/>
    <!-- 180°-225° -->
    <path d="M 0 0 L -52 0 A 52 52 0 0 1 -36.77 -36.77 Z" fill="#06b6d4"/>
    <!-- 225°-270° -->
    <path d="M 0 0 L -36.77 -36.77 A 52 52 0 0 1 0 -52 Z" fill="#3b82f6"/>
    <!-- 270°-315° -->
    <path d="M 0 0 L 0 -52 A 52 52 0 0 1 36.77 -36.77 Z" fill="#8b5cf6"/>
    <!-- 315°-360° -->
    <path d="M 0 0 L 36.77 -36.77 A 52 52 0 0 1 52 0 Z" fill="#ec4899"/>
  </g>

  <!-- Outer gold ring -->
  <circle cx="100" cy="75" r="52" fill="none" stroke="#ffce46" stroke-width="3"/>

  <!-- Centre hub -->
  <circle cx="100" cy="75" r="8" fill="#1a1a1a" stroke="#ffce46" stroke-width="2"/>
  <circle cx="100" cy="75" r="3" fill="#ffce46"/>

  <!-- Pointer triangle at top of wheel -->
  <polygon points="100,15 92,28 108,28" fill="#ffce46" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Label -->
  <text x="100" y="142" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif"
        font-size="11" font-weight="bold" fill="#ffce46">Çark</text>
</svg>
