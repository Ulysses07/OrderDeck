<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <!-- Dark green track background -->
  <rect width="200" height="150" fill="#0f1118" rx="6"/>
  <rect x="8" y="18" width="168" height="98" rx="8" fill="#1a3320" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Lane dividers (4 lanes) -->
  <!-- Lane 1 -->
  <rect x="12" y="24" width="160" height="18" rx="3" fill="#2c5530" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Lane 2 -->
  <rect x="12" y="46" width="160" height="18" rx="3" fill="#2c5530" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Lane 3 -->
  <rect x="12" y="68" width="160" height="18" rx="3" fill="#2c5530" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Lane 4 -->
  <rect x="12" y="90" width="160" height="18" rx="3" fill="#2c5530" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Checkered finish line at ~88% -->
  <rect x="154" y="18" width="4" height="98"
        fill="url(#checker)" rx="1"/>

  <defs>
    <pattern id="checker" x="0" y="0" width="4" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#fff"/>
      <rect y="4" width="4" height="4" fill="#000"/>
    </pattern>
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- FİNİŞ banner -->
  <rect x="140" y="11" width="28" height="10" rx="2" fill="#ffce46"/>
  <text x="154" y="19" font-family="Segoe UI, system-ui, sans-serif" font-size="6"
        font-weight="700" fill="#1a1a1a" text-anchor="middle">FİNİŞ</text>

  <!-- Cars — Lane 1: winner (red), near finish line -->
  <rect x="118" y="27" width="32" height="12" rx="6" fill="#ef4444" filter="url(#glow-gold)"
        stroke="#ffce46" stroke-width="1.5"/>
  <text x="134" y="36" font-family="Segoe UI, system-ui, sans-serif" font-size="6"
        font-weight="700" fill="#fff" text-anchor="middle">Player1</text>

  <!-- Cars — Lane 2: orange, trailing -->
  <rect x="80" y="49" width="32" height="12" rx="6" fill="#f97316"/>
  <text x="96" y="58" font-family="Segoe UI, system-ui, sans-serif" font-size="6"
        font-weight="700" fill="#fff" text-anchor="middle">Player2</text>

  <!-- Cars — Lane 3: blue, further back -->
  <rect x="55" y="71" width="32" height="12" rx="6" fill="#3b82f6"/>
  <text x="71" y="80" font-family="Segoe UI, system-ui, sans-serif" font-size="6"
        font-weight="700" fill="#fff" text-anchor="middle">Player3</text>

  <!-- Cars — Lane 4: purple, near start -->
  <rect x="28" y="93" width="32" height="12" rx="6" fill="#8b5cf6"/>
  <text x="44" y="102" font-family="Segoe UI, system-ui, sans-serif" font-size="6"
        font-weight="700" fill="#fff" text-anchor="middle">Player4</text>

  <!-- "Yarış" label below track -->
  <text x="100" y="128" font-family="Segoe UI, system-ui, sans-serif" font-size="14"
        font-weight="700" fill="#ffce46" text-anchor="middle">Yarış</text>
  <text x="100" y="143" font-family="Segoe UI, system-ui, sans-serif" font-size="9"
        fill="#6b7280" text-anchor="middle">finiş çizgisi</text>
</svg>
