<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <!-- Background -->
  <rect width="200" height="150" fill="#0f1118" rx="8"/>

  <!-- Row 1 -->
  <!-- Red/eliminated cell (top-left) -->
  <rect x="14" y="16" width="46" height="32" rx="5" fill="#dc2626" stroke="#fecaca" stroke-width="1.5"/>
  <line x1="22" y1="24" x2="52" y2="40" stroke="#fecaca" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="24" x2="22" y2="40" stroke="#fecaca" stroke-width="2" stroke-linecap="round"/>

  <!-- Dark gray cell -->
  <rect x="68" y="16" width="46" height="32" rx="5" fill="#1f2937" stroke="none"/>

  <!-- Red/eliminated cell -->
  <rect x="122" y="16" width="46" height="32" rx="5" fill="#dc2626" stroke="#fecaca" stroke-width="1.5"/>
  <line x1="130" y1="24" x2="160" y2="40" stroke="#fecaca" stroke-width="2" stroke-linecap="round"/>
  <line x1="160" y1="24" x2="130" y2="40" stroke="#fecaca" stroke-width="2" stroke-linecap="round"/>

  <!-- Row 2 -->
  <!-- Dark gray cell -->
  <rect x="14" y="56" width="46" height="32" rx="5" fill="#1f2937" stroke="none"/>

  <!-- WINNER cell (center, spans 2 rows roughly, made larger) -->
  <rect x="68" y="56" width="100" height="68" rx="6" fill="#fef3c7" stroke="#ffce46" stroke-width="2.5"/>
  <text x="118" y="97" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a" text-anchor="middle" dominant-baseline="middle">KAZANAN!</text>
  <!-- Gold glow hint -->
  <rect x="68" y="56" width="100" height="68" rx="6" fill="none" stroke="#ffce46" stroke-width="4" opacity="0.3"/>

  <!-- Red/eliminated cell -->
  <rect x="14" y="96" width="46" height="32" rx="5" fill="#dc2626" stroke="#fecaca" stroke-width="1.5"/>
  <line x1="22" y1="104" x2="52" y2="120" stroke="#fecaca" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="104" x2="22" y2="120" stroke="#fecaca" stroke-width="2" stroke-linecap="round"/>

  <!-- Row 3 extra cell top-right (dark) -->
  <rect x="176" y="16" width="10" height="32" rx="3" fill="#1f2937" opacity="0.5"/>

  <!-- Row 2 right (dark) -->
  <rect x="176" y="56" width="10" height="32" rx="3" fill="#1f2937" opacity="0.5"/>

  <!-- Red cell bottom-right -->
  <rect x="176" y="96" width="10" height="32" rx="3" fill="#dc2626" opacity="0.7"/>

  <!-- Label -->
  <text x="100" y="142" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fef3c7" text-anchor="middle" letter-spacing="1">Eleme</text>
</svg>
