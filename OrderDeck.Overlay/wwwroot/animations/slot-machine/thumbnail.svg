<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <!-- Background -->
  <rect width="200" height="150" fill="#1a1a1a"/>

  <!-- Outer frame -->
  <rect x="30" y="20" width="140" height="90" rx="6" ry="6"
        fill="#0f1118" stroke="#8b0000" stroke-width="3"/>
  <!-- Gold outline ring -->
  <rect x="30" y="20" width="140" height="90" rx="6" ry="6"
        fill="none" stroke="#ffce46" stroke-width="1.5" stroke-dasharray="0"/>

  <!-- Top name bar (dimmed) -->
  <rect x="44" y="32" width="112" height="22" rx="3" fill="#1f2937"/>
  <text x="100" y="47" text-anchor="middle" font-family="sans-serif"
        font-size="10" fill="#6b7280">Katılımcı 1</text>

  <!-- Middle name bar (highlighted — gold border) -->
  <rect x="44" y="58" width="112" height="22" rx="3" fill="#3b1a00"
        stroke="#ffce46" stroke-width="1.5"/>
  <text x="100" y="73" text-anchor="middle" font-family="sans-serif"
        font-size="10" font-weight="bold" fill="#ffce46">Kazanan</text>

  <!-- Bottom name bar (dimmed) -->
  <rect x="44" y="84" width="112" height="22" rx="3" fill="#1f2937"/>
  <text x="100" y="99" text-anchor="middle" font-family="sans-serif"
        font-size="10" fill="#6b7280">Katılımcı 3</text>

  <!-- Left gold marker (triangle pointing right) -->
  <polygon points="26,69 36,63 36,75" fill="#ffce46"/>
  <!-- Right gold marker (triangle pointing left) -->
  <polygon points="174,69 164,63 164,75" fill="#ffce46"/>

  <!-- Label below -->
  <text x="100" y="128" text-anchor="middle" font-family="sans-serif"
        font-size="14" font-weight="bold" fill="#ffce46">Slot</text>
</svg>
