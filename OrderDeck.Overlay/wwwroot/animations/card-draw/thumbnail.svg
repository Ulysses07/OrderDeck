<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <!-- Background -->
  <rect width="200" height="150" fill="#1a1a1a" rx="8"/>

  <!-- ── Deck: 3 stacked card-backs (left side) ── -->

  <!-- Card back 3 (bottom, most offset) -->
  <rect x="22" y="24" width="66" height="94" rx="6"
        fill="#7f1d1d" stroke="#ffce46" stroke-width="2"/>
  <pattern id="diamond3" patternUnits="userSpaceOnUse"
           width="8" height="8" patternTransform="rotate(45)">
    <rect width="4" height="8" fill="#7f1d1d"/>
    <rect x="4" width="4" height="8" fill="#a31d1d"/>
  </pattern>
  <rect x="22" y="24" width="66" height="94" rx="6" fill="url(#diamond3)" opacity="0.9"/>
  <rect x="22" y="24" width="66" height="94" rx="6"
        fill="none" stroke="#ffce46" stroke-width="2"/>
  <rect x="27" y="29" width="56" height="84" rx="4"
        fill="none" stroke="#ffce46" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Card back 2 (middle) -->
  <rect x="18" y="19" width="66" height="94" rx="6"
        fill="#7f1d1d" stroke="#ffce46" stroke-width="2"/>
  <rect x="18" y="19" width="66" height="94" rx="6" fill="url(#diamond3)" opacity="0.9"/>
  <rect x="18" y="19" width="66" height="94" rx="6"
        fill="none" stroke="#ffce46" stroke-width="2"/>
  <rect x="23" y="24" width="56" height="84" rx="4"
        fill="none" stroke="#ffce46" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Card back 1 (top of deck) -->
  <rect x="14" y="14" width="66" height="94" rx="6"
        fill="#7f1d1d" stroke="#ffce46" stroke-width="2.5"/>
  <rect x="14" y="14" width="66" height="94" rx="6" fill="url(#diamond3)" opacity="0.9"/>
  <rect x="14" y="14" width="66" height="94" rx="6"
        fill="none" stroke="#ffce46" stroke-width="2.5"/>
  <rect x="19" y="19" width="56" height="84" rx="4"
        fill="none" stroke="#ffce46" stroke-opacity="0.45" stroke-width="1.5"/>

  <!-- ── Face-up revealed card (right side) ── -->
  <rect x="112" y="14" width="74" height="104" rx="6"
        fill="#fffaf0" stroke="#ffce46" stroke-width="2.5"/>

  <!-- Star decoration top -->
  <text x="149" y="38" font-size="14" fill="#ffce46"
        text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif">★</text>

  <!-- Winner name placeholder -->
  <text x="149" y="72" font-size="11" fill="#1a1a1a" font-weight="bold"
        text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif">İsim</text>

  <!-- Star decoration bottom -->
  <text x="149" y="100" font-size="14" fill="#ffce46"
        text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif">★</text>

  <!-- ── Label ── -->
  <text x="100" y="138" font-size="11" fill="#ffce46" font-weight="bold"
        text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif"
        letter-spacing="1">Kart</text>
</svg>
