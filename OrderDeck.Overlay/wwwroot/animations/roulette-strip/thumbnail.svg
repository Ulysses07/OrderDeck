<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <!-- Background -->
  <rect width="200" height="150" fill="#0f1118"/>

  <!-- Frame border -->
  <rect x="10" y="30" width="180" height="58" rx="6" ry="6"
        fill="#1a1a1a" stroke="#ffce46" stroke-width="2"/>

  <!-- Cell 1 — red -->
  <rect x="10" y="30" width="36" height="58" rx="3" ry="3" fill="#ef4444"/>
  <text x="28" y="63" text-anchor="middle" font-family="sans-serif"
        font-size="7" font-weight="bold" fill="#fff">Ali</text>

  <!-- Cell 2 — orange -->
  <rect x="46" y="30" width="36" height="58" fill="#f97316"/>
  <text x="64" y="63" text-anchor="middle" font-family="sans-serif"
        font-size="7" font-weight="bold" fill="#fff">Burak</text>

  <!-- Cell 3 (winner — centre) — blue, gold outline -->
  <rect x="82" y="30" width="36" height="58" fill="#3b82f6"/>
  <rect x="82" y="30" width="36" height="58"
        fill="none" stroke="#ffce46" stroke-width="2"/>
  <text x="100" y="63" text-anchor="middle" font-family="sans-serif"
        font-size="7" font-weight="bold" fill="#ffce46">Kazanan</text>

  <!-- Cell 4 — purple -->
  <rect x="118" y="30" width="36" height="58" fill="#8b5cf6"/>
  <text x="136" y="63" text-anchor="middle" font-family="sans-serif"
        font-size="7" font-weight="bold" fill="#fff">Deniz</text>

  <!-- Cell 5 — green -->
  <rect x="154" y="30" width="36" height="58" rx="3" ry="3" fill="#22c55e"/>
  <text x="172" y="63" text-anchor="middle" font-family="sans-serif"
        font-size="7" font-weight="bold" fill="#fff">Ece</text>

  <!-- Cell separators (subtle dark lines) -->
  <line x1="46"  y1="30" x2="46"  y2="88" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  <line x1="82"  y1="30" x2="82"  y2="88" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  <line x1="118" y1="30" x2="118" y2="88" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  <line x1="154" y1="30" x2="154" y2="88" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>

  <!-- Vertical guide line at centre -->
  <line x1="100" y1="30" x2="100" y2="88"
        stroke="rgba(255,206,70,0.7)" stroke-width="1.5"/>

  <!-- Top triangle marker (pointing down) -->
  <polygon points="100,20 92,30 108,30" fill="#ffce46"
           filter="url(#ds)"/>

  <!-- Bottom triangle marker (pointing up) -->
  <polygon points="100,98 92,88 108,88" fill="#ffce46"
           filter="url(#ds)"/>

  <defs>
    <filter id="ds" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5"
                    flood-color="rgba(0,0,0,0.55)"/>
    </filter>
  </defs>

  <!-- Label -->
  <text x="100" y="128" text-anchor="middle" font-family="sans-serif"
        font-size="14" font-weight="bold" fill="#ffce46">Rulet</text>
</svg>
