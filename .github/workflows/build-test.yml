name: build-test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    # WPF projects target net10.0-windows, so the whole solution needs windows-latest.
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          # Pinned by global.json (rollForward latestFeature, allowPrerelease).
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore OrderDeck.sln

      - name: Build (Release)
        run: dotnet build OrderDeck.sln --configuration Release --no-restore --nologo

      # WPF-touching tests (DispatcherTimer in GiveawayBannerViewModelTests,
      # WPF-only ViewModelBase) attach a Dispatcher to each xUnit
      # thread-pool thread it runs on. Under default parallel test-collection
      # execution these dispatchers prevent the test host process from
      # exiting cleanly after the last test passes, hanging until the
      # 25-min job timeout. Force serial collection runs and bound the
      # hang window so any future leak fails fast with a dump.
      - name: Test - OrderDeck.Tests (Core/App)
        run: >
          dotnet test OrderDeck.Tests/OrderDeck.Tests.csproj
          --configuration Release --no-build --no-restore --nologo
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=core-app.trx"
          --results-directory ${{ github.workspace }}/TestResults
          --blame-hang-timeout 5m
          -- xUnit.ParallelizeTestCollections=false

      - name: Test - OrderDeck.Licensing.Tests
        run: >
          dotnet test OrderDeck.Licensing.Tests/OrderDeck.Licensing.Tests.csproj
          --configuration Release --no-build --no-restore --nologo
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=licensing.trx"
          --results-directory ${{ github.workspace }}/TestResults
          --blame-hang-timeout 5m

      # NOTE: previous flag was `xUnit.ParallelizeAssembly=false` — that's a
      # no-op when running a single .csproj. The actual switch we want is
      # `ParallelizeTestCollections=false` (in-assembly serialization).
      - name: Test - OrderDeck.LicenseServer.Tests
        run: >
          dotnet test OrderDeck.LicenseServer.Tests/OrderDeck.LicenseServer.Tests.csproj
          --configuration Release --no-build --no-restore --nologo
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=license-server.trx"
          --results-directory ${{ github.workspace }}/TestResults
          --blame-hang-timeout 5m
          -- xUnit.ParallelizeTestCollections=false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ github.workspace }}/TestResults/*.trx
          if-no-files-found: warn
