name: license-server-deploy

# License-server CI deploy. Fires after build-test passes on master:
# build a Linux image (license-server is net10.0, no WPF), push to GHCR
# with `latest` + immutable `master-<sha>` tags, ssh into the VPS to do
# `docker compose pull && up -d`, smoke /healthz.
#
# Path filtering is implicit: the Dockerfile only copies OrderDeck.LicenseServer/
# (no ProjectReference to other projects), so commits that don't touch
# license-server produce a byte-identical image manifest. `docker compose pull`
# detects the unchanged digest and `up -d` is a no-op — effectively a free
# fast-path for unrelated master commits.
#
# Rollback: pin LICENSE_SERVER_TAG=master-<previous-sha> in /opt/orderdeck/.env
# and re-run `docker compose up -d license-server`. Tags are immutable.

on:
  workflow_run:
    workflows: ["build-test"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: license-server-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Skip if upstream build-test failed; allow workflow_dispatch unconditionally.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run carries the upstream sha; workflow_dispatch falls back
          # to the dispatched ref's HEAD.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT="${SHA:0:7}"
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "short=${SHORT}" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/ulysses07/orderdeck-license-server" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: OrderDeck.LicenseServer/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:master-${{ steps.tags.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # `pull` is the canonical way to refresh `latest`. `up -d` is a
          # no-op when the image digest didn't change (unrelated master push).
          # `image prune --filter until=72h` keeps the disk lean — recent
          # rollback targets stay, ancient unused layers go.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'set -e
             cd /opt/orderdeck
             docker compose pull license-server
             docker compose up -d license-server
             docker image prune -f --filter "until=72h" >/dev/null'

      - name: Smoke test
        run: |
          # license-server start time on this VPS is ~10s cold, longer on EF
          # migration. Poll up to 60s.
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 5 \
                   https://license.orderdeckapp.com/healthz || echo "000")
            if [ "$code" = "200" ]; then
              echo "Healthy after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::healthz failed to return 200 within 60s"
          exit 1
